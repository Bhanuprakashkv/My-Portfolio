<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hover-box {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .highlight {
            background-color: #ffeb3b !important;
            border: 2px solid #fbc02d;
        }
    </style>
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded">
        <h2 id="main-title">DOM Manipulation Demo</h2>
        <p class="text-muted">This text will be changed by JS.</p>
        <hr>
        <div class="mb-4">
            <img id="logo" src="https://via.placeholder.com/100" alt="Placeholder" class="rounded mb-2">
            <br>
            <button id="btn-attr" class="btn btn-primary btn-sm">Change Image & Style</button>
        </div>
        <div id="hover-zone" class="p-3 mb-3 border text-center hover-box">
            Hover over me!
        </div>
        <div class="mb-4">
            <button id="btn-add" class="btn btn-success btn-sm">Add Item</button>
            <ul id="item-list" class="list-group mt-3">
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    Original Item
                    <button class="btn btn-danger btn-sm remove-btn">X</button>
                </li>
            </ul>
        </div>
        <form id="sample-form" class="border p-3 rounded bg-light">
            <div class="mb-3">
                <input type="text" id="user-input" class="form-control" placeholder="Type something..." required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Submit Form</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>

<html>
<head>
	<title>CSS Transition example</title>
	<style type="text/css">

div {
    width: 200px;
    height: 200px;
    background-color: lightblue;
    border: 2px solid black;
    border-radius:50%;
    transition: width 3s, height 3s, transform 3s;
}

div:hover {
    width: 400px;
    height: 150px;
    transform: rotate(360deg);
}
</style>
</head>
<body>
<h1>CSS TRANSITION</h1>
<div> </div>

</body>
</html>

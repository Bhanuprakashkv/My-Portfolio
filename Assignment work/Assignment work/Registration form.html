<!DOCTYPE html>
<html>
<head>
	<title>Form Applications...</title>
</head>
<body bgcolor="lightyellow">
	<center><h2>Form Registration...</h2></center>
	<form action="https://x.com" method="post">
	 <center>
	 <table border="1">
		<tr><td >Username:</td> <td><input text="name" type="text" required/> </td></tr>
		<tr><td >Password:</td> <td> <input text="password" type="password" required/> </td></tr>
		<tr><td >Email:</td> <td><input text="email" type="email" required/> </td></tr>
		<tr><td >Phone No.:</td> <td><input text="phone" type="tel" pattern="[0-9]{10}" required /> </td></tr>
		<tr><td >Address:</td> <td><input type="text" name="address" required/> </td></tr>
		<tr><td>Gender:</td> <td><input type="radio" name="gender" value="male" required>Male
			<input type="radio" name="gender" value="female" required>Female
			<input type="radio" name="gender" value="not to prefer" required>Others</td></tr>
		<tr><td>Courses Interested:</td> <td><input type="checkbox" name="course" value="DBMS" > DBMS
        	    	<input type="checkbox" name="course" value="DSA"> DSA
        	    	<input type="checkbox" name="course" value="OS"> OS
        	   	<input type="checkbox" name="course" value="Fullstack"> Fullstack </td></tr>
		<tr><td>Branch:</td> <td><select name="branch">
				 	 <option>Select the Branch</option>
        			 	 <option>CSIT</option>
        			 	 <option>CSSE</option>
        			 	 <option>EEE</option>
        				 <option>CSE</option>
        				 <option>CSM</option>
    					 </select> </td></tr>
		<tr><td>Date of Birth:</td><td><input type="date" name="dob" required/></td></tr>
		<tr><td>Time:</td> <td><input type="time" required/> </td></tr>
		<tr><td>Week:</td> <td><input type="week" required/> </td></tr>
		<tr><td>Upload Photo:</td><td> <input type="file" name="photo" required/></td></tr>
		<tr><td>File:</td> <td><input type="file" /> </td></tr>
		<tr><td>File range:</td> <td><input type="range" /> </td></tr>
		<tr><td>Search:</td> <td><input type="search" /> </td></tr>
		<tr><td>Skills:</td> <td><input type="checkbox" name="skills" value="C"> C
          		       		 <input type="checkbox" name="skills" value="Java"> Java
                	       		 <input type="checkbox" name="skills" value="DSA"> DSA
               		      		 <input type="checkbox" name="skills" value="CN"> CN </td></tr>
         		 
		<tr><td colspan="2" align="center"> <input type="submit" value="Submit"/> </td></tr>
	 </table>
	 </center>
	</form> 
<br><br><br><br><br><br>

</body>
</html>

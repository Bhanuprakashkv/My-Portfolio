<head>
 <title>CSS table Example</title>
<style>
        table, td, th { border: 4px solid pink; table-layout: auto; }
	table { width: 80%}
	th, tr {height: 50px; }
	tr:hover {background-color: blue; color:red; }
	tr:nth-child(even) {background-color:skyblue }
	tr:nth-child(odd) {background-color: pink }
	tr { text-align: center; }
</style></head>
<body>
<h1>CSS Table Example</h1>
<center>
<table border="1">
<caption><h2>First Table</h2></caption>
	<tr> <th>SNO.</th><th>Name</th><th>Age</th> </tr>

	<tr> <td>1</td><td>Akhil</td><td>25</td> </tr>
	
	<tr> <td>2</td><td>Ajay</td><td>21</td> </tr>

	<tr> <td>3</td><td>Prabhas</td><td>23</td> </tr>

	<tr> <td>4</td><td>Akhilesh</td><td>24</td> </tr>

</table></center>

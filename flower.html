<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to Load Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <button id="loadBtn" class="btn btn-lg btn-success shadow mb-4" onclick="generateTable()">
            Click to Show marks
        </button>

        <div id="tableWrapper" class="card shadow d-none">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Marks Data Array</h4>
            </div>
            <div class="card-body">
                <table class="table table-hover border mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Marks</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const names = [
            { name: "Bhanu", marks: "80" },
            { name: "Harsha", marks: "95" },
            { name: "Lokesh", marks: "85" },
            { name: "Akhil", marks: "80" }
        ];
        function generateTable() {
            const tableBody = document.getElementById('tableBody');
            const tableWrapper = document.getElementById('tableWrapper');
            const loadBtn = document.getElementById('loadBtn');
            const htmlContent = names.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.marks}</td>
                </tr>
            `).join('');
            tableBody.innerHTML = htmlContent;
            tableWrapper.classList.remove('d-none');
            loadBtn.innerText = "Data Loaded Successfully!";
            loadBtn.classList.replace('btn-success', 'btn-outline-secondary');
            loadBtn.disabled = true;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Square</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: sans-serif;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        .box {
            width: 200px;
            height: 200px;
            background-color: #ff4d4d;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .box:hover {
           width: 1000px;      
            transform: tilt(360deg); 
        }
    </style>
</head>
<body>
    <h1>CSS Transition</h1>
    <div class="box"></div>
</body>
</html>

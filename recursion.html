<!DOCTYPE html>
<html>
<head>
    <title>Recursive Sum</title>
</head>
<body>
    <form>
        <input type="text" id="ip" placeholder="Enter n">
        <input type="button" value="Calculate Sum" onclick="test()">
    </form>
    <div id="op"></div>
    <script>
        function sum(n) {
            if (n <= 1) {
                return n;
            }
            return n + sum(n - 1);
        }
        function test() {
            var val = Number(document.getElementById("ip").value);
            var result = sum(val);
            document.getElementById("op").innerHTML = "Sum is: " + result;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Rupee Prize Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="card mx-auto shadow" style="max-width: 400px;">
        <div class="card-body text-center">
            <h3>Guess & Win!</h3>
            <p>Number is between 1 and 100</p> 
            <div class="d-flex justify-content-around mb-3">
                <h5 class="text-primary">Prize: ₹<span id="money">1000</span></h5>
                <h5 class="text-danger">Chances: <span id="chanceCount">5</span></h5>
            </div>
            <input type="number" id="guess" class="form-control mb-3" placeholder="Enter guess...">
            <button type="button" class="btn btn-success w-100" id="btn" onclick="play()">Submit Guess</button>
            <div id="msg" class="mt-3 fw-bold"></div>
            <button class="btn btn-link d-none" id="retry" onclick="location.reload()">Try Again</button>
        </div>
    </div>
    <script>
        let target = Math.floor(Math.random() * 100) + 1;
        let prize = 1000;
        let chances = 5;
        function play() {
            let input = document.getElementById("guess");
            let userGuess = parseInt(input.value);
            let msg = document.getElementById("msg");
            if (isNaN(userGuess)) {
                msg.innerHTML = "❌ Please enter a number!";
                return;
            }
            if (userGuess === target) {
                msg.innerHTML = "🏆 Correct! You won ₹" + prize + "!";
                msg.className = "mt-3 text-success fw-bold";
                endGame();
            } else {
                chances--; 
                prize -= 200; 
                document.getElementById("chanceCount").innerHTML = chances;
                document.getElementById("money").innerHTML = prize > 0 ? prize : 0;
                if (chances <= 0) {
                    msg.innerHTML = "💀 Game Over! The number was " + target;
                    msg.className = "mt-3 text-danger fw-bold";
                    endGame();
                } else {
                    msg.innerHTML = userGuess < target ? "Try HIGGER ⬆️" : "Try SMALLER ⬇️";
                    msg.className = "mt-3 text-warning fw-bold";
                }
            }
            input.value = "";
            input.focus();
        }
        function endGame() {
            document.getElementById("btn").disabled = true;
            document.getElementById("guess").disabled = true;
            document.getElementById("retry").classList.remove("d-none");
        }
    </script>
</body>
</html>

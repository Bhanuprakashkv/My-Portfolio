<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Array Manipulator Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .code-block { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 8px; font-family: monospace; }
        .result-box { background: #e9ecef; border-left: 5px solid #0d6efd; padding: 15px; min-height: 50px; }
        .btn-custom { margin-bottom: 5px; width: 100%; text-align: left; }
    </style>
</head>
<body>
<div class="container py-5">
    <header class="pb-3 mb-4 border-bottom">
        <span class="fs-4">JS Array Manipulator Visualizer</span>
    </header>
    <div class="row">0
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">Current Array</div>
                <div class="card-body">
                    <h3 id="displayArray" class="text-center text-primary">[10, 20, 30, 40, 50]</h3>
                    <p class="text-muted small text-center mt-2">The methods below will interact with this data.</p>
                </div>
            </div>
            <div class="list-group">
                <button onclick="runMap()" class="list-group-item list-group-item-action">.map() (Double values)</button>
                <button onclick="runFilter()" class="list-group-item list-group-item-action">.filter() (Values > 25)</button>
                <button onclick="runReduce()" class="list-group-item list-group-item-action">.reduce() (Sum total)</button>
                <button onclick="runReduceRight()" class="list-group-item list-group-item-action">.reduceRight() (Subtract R to L)</button>
                <button onclick="runForEach()" class="list-group-item list-group-item-action">.forEach() (Log to UI)</button>
                <button onclick="runForOf()" class="list-group-item list-group-item-action">for...of (Iterate values)</button>
                <button onclick="runForIn()" class="list-group-item list-group-item-action">for...in (Iterate keys)</button>
                <button onclick="runPush()" class="list-group-item list-group-item-action list-group-item-warning">.push() (Add random num)</button>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex justify-content-between">
                    <span>Code Execution & Output</span>
                    <button class="btn btn-sm btn-outline-light" onclick="resetArray()">Reset Array</button>
                </div>
                <div class="card-body">
                    <h6>Method Logic:</h6>
                    <pre id="codeDisplay" class="code-block">// Select a method to see the logic</pre>              
                    <h6>Result:</h6>
                    <div id="resultOutput" class="result-box">Click a button to start...</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let numbers = [10, 20, 30, 40, 50];
    const display = document.getElementById('displayArray');
    const resultBox = document.getElementById('resultOutput');
    const codeBox = document.getElementById('codeDisplay');
    function updateUI(result, code) {
        display.innerText = JSON.stringify(numbers);
        resultBox.innerText = result;
        codeBox.innerText = code;
    }
    // 1. map() - Creates a new array by transforming every element
    function runMap() {
        const doubled = numbers.map(num => num * 2);
        updateUI(`New Array: [${doubled}]`, `const doubled = numbers.map(num => num * 2);`);
    }
    // 2. filter() - Creates a new array with elements that pass a test
    function runFilter() {
        const filtered = numbers.filter(num => num > 25);
        updateUI(`Filtered: [${filtered}]`, `const filtered = numbers.filter(num => num > 25);`);
    }
    // 3. reduce() - Reduces array to a single value (Left-to-Right)
    function runReduce() {
        const sum = numbers.reduce((acc, curr) => acc + curr, 0);
        updateUI(`Total Sum: ${sum}`, `const sum = numbers.reduce((acc, curr) => acc + curr, 0);`);
    }
    // 4. reduceRight() - Reduces array to a single value (Right-to-Left)
    function runReduceRight() {
        const sub = numbers.reduceRight((acc, curr) => acc - curr);
        updateUI(`Result (50-40-30-20-10): ${sub}`, `const sub = numbers.reduceRight((acc, curr) => acc - curr);`);
    }
    // 5. forEach() - Executes logic for every element (returns undefined)
    function runForEach() {
        let text = "";
        numbers.forEach((val, i) => text += `Index ${i} has value ${val} | `);
        updateUI("Check Output Below", `numbers.forEach((val, i) => { \n  // Do something with val \n});`);
        resultBox.innerText = text;
    }
    // 6. for...of - Iterates over iterable values
    function runForOf() {
        let output = "Values: ";
        for (const value of numbers) { output += value + " "; }
        updateUI(output, `for (const value of numbers) { \n  console.log(value); \n}`);
    }
    // 7. for...in - Iterates over object keys (indexes in arrays)
    function runForIn() {
        let output = "Indexes: ";
        for (const index in numbers) { output += index + " "; }
        updateUI(output, `for (const index in numbers) { \n  console.log(index); \n}`);
    }
    // 8. push() - Adds element to end (Modifies original array)
    function runPush() {
        const rand = Math.floor(Math.random() * 100);
        numbers.push(rand);
        updateUI(`Added ${rand}`, `numbers.push(${rand});`);
    }
    function resetArray() {
        numbers = [10, 20, 30, 40, 50];
        updateUI("Array Reset", "// Resetting to initial state");
    }
</script>
</body>
</html>

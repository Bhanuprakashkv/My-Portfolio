<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Horizontal List</title>
    <style>
        /* 1. Reset default list and link styles */
        .nav-container {
            list-style-type: none; /* Removes bullet symbols */
            padding: 0;
            margin: 20px;
            display: flex;         /* Displays items side-by-side */
            gap: 20px;             /* Leaves an empty gap between items */
        }

        /* 2. Styling the list items (the boxes) */
        .nav-item {
            width: 150px;          /* Fixed width */
            background-color: #4CAF50; /* Initial background color */
            border-radius: 8px;    /* Optional: rounded corners */
            text-align: center;
            transition: all 0.3s ease; /* Makes the hover effect smooth */
        }

        /* 3. Styling the links inside the list items */
        .nav-link {
            display: block;        /* Makes the entire box clickable, not just the text */
            padding: 15px 0;       /* Vertical padding for height */
            color: white;          /* Text color */
            text-decoration: none; /* Removes the default underline */
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* 4. Hover effect */
        /* Changes background color and slightly lifts the item when hovered */
        .nav-item:hover {
            background-color: #45a049; /* Slightly darker green */
            transform: translateY(-3px); /* Subtle "pop" effect */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Optional: Change link color specifically on hover if desired */
        .nav-item:hover .nav-link {
            color: #f0f0f0;
        }
    </style>
</head>
<body>

    <ul class="nav-container">
        <li class="nav-item">
            <a href="https://google.com" class="nav-link">Google</a>
        </li>
        <li class="nav-item">
            <a href="https://flipkart.com" class="nav-link">Flipkart</a>
        </li>
        <li class="nav-item">
            <a href="https://amazon.in" class="nav-link">Amazon</a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link">Contact</a>
        </li>
    </ul>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Assignment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      overflow-x: hidden;
    }
    .sidebar {
      height: 100vh;
      background-color: #343a40;
      color: white;
      padding-top: 20px;
    }
    .sidebar a {
      color: white;
      display: block;
      padding: 10px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #495057;
    }
    .card img {
      height: 200px;
      object-fit: cover;
    }
    footer {
      background-color: #343a40;
      color: white;
      padding: 15px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar">
      <h4 class="text-center">Menu</h4>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
    <div class="col-md-10">
      <div id="carouselExample" class="carousel slide mt-3" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="https://picsum.photos/1200/400?1" class="d-block w-100">
          </div>
          <div class="carousel-item">
            <img src="https://picsum.photos/1200/400?2" class="d-block w-100">
          </div>
          <div class="carousel-item">
            <img src="https://picsum.photos/1200/400?3" class="d-block w-100">
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
      <div class="container mt-4">
        <div class="row">
          <div class="col-md-4 mb-4">
            <div class="card">
              <img src="https://picsum.photos/300/200?4" class="card-img-top">
              <div class="card-body">
                <h5 class="card-title">Product 1</h5>
                <p class="card-text">This is a sample product description.</p>
                <p><strong>₹499</strong></p>
                <a href="#" class="btn btn-primary">Buy Now</a>
              </div>
            </div>
          </div>
          <div class="col-md-4 mb-4">
            <div class="card">
              <img src="https://picsum.photos/300/200?5" class="card-img-top">
              <div class="card-body">
                <h5 class="card-title">Product 2</h5>
                <p class="card-text">This is another product description.</p>
                <p><strong>₹799</strong></p>
                <a href="#" class="btn btn-success">Buy Now</a>
              </div>
            </div>
          </div>
          <div class="col-md-4 mb-4">
            <div class="card">
              <img src="https://picsum.photos/300/200?6" class="card-img-top">
              <div class="card-body">
                <h5 class="card-title">Product 3</h5>
                <p class="card-text">This is a premium product.</p>
                <p><strong>₹999</strong></p>
                <a href="#" class="btn btn-danger">Buy Now</a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer>
        <p>Thanks For Visiting My Page</p>
      </footer>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

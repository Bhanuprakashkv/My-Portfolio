<!DOCTYPE html>
<html>
<head>
    <title>Table Generator</title>
</head>
<body>
    <div>
        <form>
            <input type="text" id="ip" placeholder="Enter number of rows">
            <input type="button" value="Create Table" onclick="test()">
        </form>
    </div>
    <div id="op"></div>
    <script>
        function test() {
            var n = Number(document.getElementById("ip").value);
          var tstart = "<table><thead><th>SNo</th></thead><tbody>";
var tend = "</tbody></table>";
var rows ="";
            for (var i = 1; i <= n; i++) {
                rows +="<tr><td>"+ i +"</td></tr>";

            }
           var table = tstart + rows + tend;
            document.getElementById("op").innerHTML = table;
        }
    </script>
</body>
</html>

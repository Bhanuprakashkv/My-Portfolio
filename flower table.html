<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordered Table on Click</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center">
        <button id="loadBtn" class="btn btn-lg btn-primary shadow mb-4" onclick="generateTable()">
            click to show marks
        </button>
        <div id="tableWrapper" class="card shadow d-none">
            <div class="card-body">
                <table class="table table-bordered table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>name</th>
                            <th>marks</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const names = [
            { name: "Bhanu", marks: "80" },
            { name: "Harsha", marks: "95" },
            { name: "Lokesh", marks: "85" },
            { name: "Akhil", marks: "80" }
        ];
        function generateTable() {
            const tableBody = document.getElementById('tableBody');
            const tableWrapper = document.getElementById('tableWrapper');
            const htmlContent = names.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.marks}</td>
                </tr>
            `).join('');
            tableBody.innerHTML = htmlContent;
            tableWrapper.classList.remove('d-none');
            const btn = document.getElementById('loadBtn');
            btn.innerText = "Table Loaded";
            btn.classList.replace('btn-primary', 'btn-secondary');
            btn.disabled = true;
        }
    </script>
</body>
</html>

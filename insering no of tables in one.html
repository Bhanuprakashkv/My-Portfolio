<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; margin: 10px; }

        .header, .footer {
            border: 2px solid #000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .header { background-color: #90ee90; }
        .footer { background-color: #f08080; margin-top: 10px; }

        /* THE ALIGNMENT CONTAINER */
        .main-content {
            background-color: #add8e6;
            border: 2px solid #000;
            padding: 20px;
            
            /* Flexbox Magic */
            display: flex; 
            flex-direction: row;
            flex-wrap: wrap;       /* Allows tables to drop to next line on small screens */
            justify-content: space-evenly; /* Even spacing between tables */
            gap: 10px;             /* Gap between tables */
        }

        /* Individual Table Styling */
        table {
            background-color: white;
            border-collapse: collapse;
            border: 1px solid #333;
            /* Ensure 4 tables fit: 100% / 4 = 25% (minus some for gaps) */
            min-width: 200px; 
            flex: 1;               /* Makes all tables take equal width */
        }

        td, th {
            border: 1px solid #777;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">Header Division</div>

    <div class="main-content">
        <table>
            <tr><th>Table 1</th></tr>
            <tr><td>Data A</td></tr>
            <tr><td>Data B</td></tr>
        </table>

        <table>
            <tr><th>Table 2</th></tr>
            <tr><td>Data C</td></tr>
            <tr><td>Data D</td></tr>
        </table>

        <table>
            <tr><th>Table 3</th></tr>
            <tr><td>Data E</td></tr>
            <tr><td>Data F</td></tr>
        </table>

        <table>
            <tr><th>Table 4</th></tr>
            <tr><td>Data G</td></tr>
            <tr><td>Data H</td></tr>
        </table>
    </div>

    <div class="footer">Footer Badge</div>

</body>
</html>

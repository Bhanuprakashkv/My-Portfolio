<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .header {
            background-color: #90ee90; 
            border: 2px solid #000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 24px;
        }
        .main-container {
            background-color: #add8e6;
            border: 2px solid #000;
            padding: 20px;
            min-height: 400px;
      }
        h2 {
            margin-top: 0;
            font-size: 22px;
        }
        table {
            background-color: #ffffff;   
            border-collapse: collapse;    
            margin-left: 50px;            
            border: 1px solid #777;
        }
        td {
            border: 1px solid #777;      
            padding: 10px 15px;          
            color: #000;
        }
        input[type="text"], input[type="password"], input[type="email"], 
        input[type="number"], input[type="date"], input[type="time"] {
            padding: 3px;
            border: 1px solid #999;
        }
        .button-group {
            margin-top: 15px;
            margin-left: 50px;
        }
        .footer {
            background-color: #f08080;
            border: 2px solid #000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        header division
    </div>
    <div class="main-container">
        <h2>Registration Form</h2>
        <table>
            <tr>
                <td>User Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Phone No</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="g"> Male 
                    <input type="radio" name="g"> Female 
                    <input type="radio" name="g"> Other
                </td>
            </tr>
            <tr>
                <td>Age</td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td>Select Date</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Select Time</td>
                <td><input type="time"></td>
            </tr>
        </table>

        <div class="button-group">
            <button>Login</button>
            <button>Sign In</button>
        </div>
    </div>
    <div class="footer">
        footer badge
    </div>
</body>
</html>
